<!DOCTYPE html>
<html>
<head>
    <title>Cyber Login</title>
    <style>
        body { background:#0f172a; color:white; font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; }
        .box { background:#1e293b; padding:30px; border-radius:10px; width:300px; text-align:center; }
        input, button { width:100%; padding:10px; margin:10px 0; border:none; border-radius:5px; }
        button { background:#38bdf8; }
    </style>
</head>
<body>
<div class="box">
    <h2>Cyber Security Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>
<script>
function login(){
    if(document.getElementById('user').value==='admin' && document.getElementById('pass').value==='1234'){
        window.location.href='/dashboard';
    } else alert('Invalid');
}
</script>
</body>
</html>
