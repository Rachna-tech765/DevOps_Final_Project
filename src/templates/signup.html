<!DOCTYPE html>
<html>
<head>
    <title>Register - Cyber Security</title>
</head>
<body style="background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center;">
    <h2>New User Registration</h2>
    <form action="/register" method="POST">
        <input type="text" name="username" placeholder="Choose Username" required><br><br>
        <input type="password" name="password" placeholder="Choose Password" required><br><br>
        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="/" style="color: cyan;">Login here</a></p>
</body>
</html>
