<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cyber Threat Dashboard v3.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ef4444;
            border: none;
            padding: 8px 14px;
            color: white;
            cursor: pointer;
            border-radius: 6px;
        }

        /* GRID */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .ping {
            height: 8px;
            width: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
            margin-right: 8px;
        }

        /* CHART + RADAR SECTION */
        .analytics {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
        }

        .chart-box {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            height: 250px;
        }

        .radar-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
        }

        .radar-item {
            font-size: 12px;
            margin-top: 10px;
        }

        .bar {
            width: 100%;
            height: 8px;
            background: #0f172a;
            border-radius: 5px;
            border: 1px solid #334155;
            overflow: hidden;
            margin-top: 5px;
        }

        .bar div {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        #lowBar { background: #22c55e; }
        #medBar { background: #facc15; }
        #highBar { background: #ef4444; }

        /* BOTTOM */
        .bottom-row {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
            max-width: 1200px;
            margin: 20px auto;
        }

        .terminal {
            background: #000;
            color: #38bdf8;
            font-family: monospace;
            padding: 10px;
            height: 160px;
            overflow-y: auto;
            font-size: 12px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: #38bdf8;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        #alertBox {
            display: none;
            background: #ef4444;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            animation: flash 1s infinite;
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .critical {
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            25% { transform: translate(2px,-2px); }
            50% { transform: translate(-2px,2px); }
            75% { transform: translate(2px,2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>

<body>

<button class="logout-btn" onclick="logout()">LOGOUT</button>

<div id="alertBox">🚨 CRITICAL SYSTEM BREACH DETECTED 🚨</div>

<h1 id="title">THREAT_MONITOR_OS</h1>

<!-- TOP GRID -->
<div class="dashboard-grid">
    <div class="card"><small>SYSTEM STATUS</small><br><span class="ping" id="ping"></span><span id="status">SECURE</span></div>
    <div class="card"><small>ACTIVE THREATS</small><div id="threats">0</div></div>
    <div class="card"><small>IPS BLOCKED</small><div>1242</div></div>
    <div class="card"><small>CPU LOAD</small><div id="cpu">23%</div></div>
    <div class="card"><small>TRAFFIC</small><div id="traffic">120 Mbps</div></div>
    <div class="card"><small>GLOBAL THREATS</small><div id="geo"></div></div>
</div>

<!-- ANALYTICS SECTION -->
<div class="analytics">

    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

    <div class="radar-box">
        <small>THREAT RADAR</small>

        <div class="radar-item">
            LOW
            <div class="bar"><div id="lowBar"></div></div>
        </div>

        <div class="radar-item">
            MED
            <div class="bar"><div id="medBar"></div></div>
        </div>

        <div class="radar-item">
            HIGH
            <div class="bar"><div id="highBar"></div></div>
        </div>
    </div>

</div>

<!-- BOTTOM -->
<div class="bottom-row">

    <div class="card">
        <button onclick="executeAction('Firewall Purged')">PURGE FIREWALL</button>
        <button onclick="executeAction('Deep Scan')">RUN DEEP SCAN</button>
        <button onclick="simulateAttack()" class="btn-danger">SIMULATE BREACH</button>
    </div>

    <div class="card">
        <div class="terminal" id="term-out">> System ready...</div>
        <input type="text" id="term-in" placeholder="Try: /trace-ip /clear /scan-network">
    </div>

</div>

<script>
// Logout
function logout(){
    window.location.href = "login.html";
}

// Chart
const ctx = document.getElementById('chart').getContext('2d');

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: Array(20).fill(''),
        datasets: [
            {
                data: Array(20).fill(0),
                borderColor: '#38bdf8',
                tension: 0.4,
                pointRadius: 0
            },
            {
                data: Array(20).fill(0),
                borderColor: '#ef4444',
                tension: 0.4,
                pointRadius: 0
            }
        ]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: {
            x: { display: false },
            y: { grid: { color: '#334155' } }
        }
    }
});

// Terminal
const termOut = document.getElementById('term-out');

function log(msg){
    termOut.innerHTML += "<br>> " + msg;
    termOut.scrollTop = termOut.scrollHeight;
}

setInterval(()=>{
    const logs = [
        "Suspicious packet detected",
        "Port scan detected",
        "Firewall rule updated",
        "Unauthorized login attempt",
        "IP blacklisted"
    ];
    log(logs[Math.floor(Math.random()*logs.length)]);
},2000);

// Fake stats
setInterval(()=>{
    let v = Math.random()*100;
    let t = Math.random()*50;

    chart.data.datasets[0].data.push(v);
    chart.data.datasets[0].data.shift();

    chart.data.datasets[1].data.push(t);
    chart.data.datasets[1].data.shift();

    chart.update('none');

    document.getElementById('threats').innerText = Math.floor(v/10);
    document.getElementById('cpu').innerText = Math.floor(Math.random()*100)+"%";
    document.getElementById('traffic').innerText = Math.floor(Math.random()*500)+" Mbps";
},2000);

// Geo
setInterval(()=>{
    document.getElementById('geo').innerHTML = `
    🇷🇺 ${Math.floor(Math.random()*50)}<br>
    🇨🇳 ${Math.floor(Math.random()*50)}<br>
    🇺🇸 ${Math.floor(Math.random()*50)}
    `;
},3000);

// Radar
function updateRadar(){
    document.getElementById("lowBar").style.width = Math.random()*100 + "%";
    document.getElementById("medBar").style.width = Math.random()*100 + "%";
    document.getElementById("highBar").style.width = Math.random()*100 + "%";
}

setInterval(updateRadar,2500);
updateRadar();

// Actions
function executeAction(a){
    log("Executing: "+a);
}

function simulateAttack(){
    document.getElementById('alertBox').style.display = 'block';
    document.getElementById('status').innerText = 'CRITICAL';
    document.getElementById('ping').style.background = '#ef4444';
    document.getElementById('title').classList.add('critical');
    log("SYSTEM BREACH ACTIVE");
}
</script>

</body>
</html>
